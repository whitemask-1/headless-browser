<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      height: 100vh;
      background: #0f0f0f;
      font-family: Helvetica, sans-serif;
      overflow: hidden;
    }

    #sidebar {
      width: 180px;
      min-width: 180px;
      background: #0f0f0f;
      display: flex;
      flex-direction: column;
      padding: 16px 10px;
      gap: 6px;
      transition: width 0.2s ease;
      z-index: 20;
      position: relative;
    }

    #sidebar.collapsed {
      width: 40px;
      min-width: 40px;
      padding: 16px 6px;
    }

    #sidebar.collapsed .site-btn span,
    #sidebar.collapsed #title {
      display: none;
    }

    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    #title {
      color: #e2e8f0;
      font-size: 13px;
      font-weight: bold;
    }

    #toggle {
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 16px;
      cursor: pointer;
      padding: 0 4px;
    }

    #toggle:hover { color: #e2e8f0; }

    .site-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1e1e1e;
      border: none;
      border-radius: 6px;
      padding: 8px;
      color: #e2e8f0;
      font-size: 11px;
      cursor: pointer;
      text-align: left;
      width: 100%;
      -webkit-app-region: no-drag;
    }

    .site-btn:hover {
      background: #2a2a2a;
      color: #3b82f6;
    }

    .site-btn .num {
      color: #3b82f6;
      font-weight: bold;
      min-width: 12px;
    }

    body.webview-fullscreen #sidebar {
      display: none;
    }

    body.webview-fullscreen #drag {
      display: block;
      z-index: 200;
    }

    body.webview-fullscreen .drag-handle {
      display: none;
    }

    body.webview-fullscreen #tab-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 100;
    }
    

    /* transparent drag region – hidden unless fullscreen */
    #drag {
      -webkit-app-region: drag;
      height: 32px;
      width: 100%;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10;
      display: none;
    }

    /* top-center drag pill */
    .drag-handle.tc {
      -webkit-app-region: drag;
      position: fixed;
      top: 4px;
      left: 50%;
      transform: translateX(-50%);
      width: 44px;
      height: 8px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.15);
      z-index: 30;
    }

    /* Cmd-drag mode: full window becomes draggable */
    body.cmd-drag #drag {
      display: block;
      z-index: 250;
      height: 100%;
    }

    /* Search overlay */
    #search-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 500;
      justify-content: center;
      align-items: flex-start;
      padding-top: 120px;
    }
    #search-overlay.visible {
      display: flex;
    }
    #search-box {
      width: 560px;
      background: #1e1e1e;
      border-radius: 12px;
      padding: 6px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
    }
    #search-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e2e8f0;
      font-size: 15px;
      padding: 12px 14px;
      font-family: Helvetica, sans-serif;
    }
    #search-input::placeholder {
      color: #64748b;
    }
    #search-go {
      background: #3b82f6;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 13px;
      padding: 8px 16px;
      cursor: pointer;
      font-weight: bold;
    }
    #search-go:hover {
      background: #2563eb;
    }

    body.bare-mode #sidebar {
      display: none;
    }

    #copy-toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30, 30, 30, 0.9);
      color: #fff;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      z-index: 99999;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #slate-toast {
      position: fixed;
      bottom: 56px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30, 30, 30, 0.9);
      color: #fff;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      z-index: 99999;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #pin-indicator {
      position: fixed;
      top: 50px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30, 30, 30, 0.9);
      color: #fff;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      z-index: 99999;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    /* Tab container: replaces #browser */
    #tab-container {
      flex: 1;
      position: relative;
      height: 100vh;
      z-index: 15;
    }

    #tab-container webview {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* Hover trigger zone: 8px invisible strip at bottom */
    #tab-strip-trigger {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 8px;
      z-index: 1000;
      -webkit-app-region: no-drag;
    }

    /* Tab strip: hidden by default, revealed on hover */
    #tab-strip {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40px;
      background: rgba(15, 15, 15, 0.95);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      padding: 0 8px;
      gap: 2px;
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
      -webkit-app-region: no-drag;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    #tab-strip.visible {
      opacity: 1;
      pointer-events: all;
    }

    .tab-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 5px;
      cursor: pointer;
      color: #64748b;
      font-size: 11px;
      font-family: Helvetica, sans-serif;
      max-width: 160px;
      min-width: 80px;
      -webkit-app-region: no-drag;
      user-select: none;
      transition: background 0.1s, color 0.1s;
    }

    .tab-item:hover {
      background: #1e1e1e;
      color: #e2e8f0;
    }

    .tab-item.active {
      background: #1e1e1e;
      color: #e2e8f0;
      border-bottom: 2px solid #3b82f6;
    }

    .tab-favicon {
      width: 13px;
      height: 13px;
      flex-shrink: 0;
      border-radius: 2px;
    }

    .tab-favicon-placeholder {
      font-size: 11px;
      flex-shrink: 0;
    }

    .tab-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #new-tab-btn {
      background: none;
      border: none;
      color: #64748b;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      margin-left: auto;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
      font-family: Helvetica, sans-serif;
    }

    #new-tab-btn:hover {
      color: #e2e8f0;
      background: #1e1e1e;
    }

    /* Fullscreen: hide strip elements */
    body.webview-fullscreen #tab-strip,
    body.webview-fullscreen #tab-strip-trigger {
      display: none;
    }
  </style>
</head>
<body>
  <div id="drag"></div>
  <div class="drag-handle tc"></div>
  <div id="search-overlay">
    <div id="search-box">
      <input id="search-input" type="text" placeholder="Search Google or enter a URL" autofocus />
      <button id="search-go">Go</button>
    </div>
  </div>
  <div id="sidebar">
    <div id="header">
      <span id="title">Sites</span>
      <button id="toggle">‹</button>
    </div>
    <div id="buttons"></div>
  </div>
  <div id="tab-container"></div>
  <div id="tab-strip-trigger"></div>
  <div id="tab-strip">
    <button id="new-tab-btn">+</button>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
